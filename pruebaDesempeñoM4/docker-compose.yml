services:
  postgres-db:
    image: postgres:17
    container_name: postgres-l
    restart: always
    environment:
      POSTGRES_USER: LI
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: pruebaDesempeño
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo-db:
    image: mongo:8
    container_name: mongodb
    restart: always
    ports:
      - "27000:27017" # <--- Solución: Entras por el 27018 para evitar el bloqueo
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: